# yaml-language-server: $schema=https://raw.githubusercontent.com/SchemaStore/schemastore/refs/heads/master/src/schemas/json/github-workflow.json
name: pages
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      # The site renders helm-schema's live output as committed schema snippets;
      # regenerate them when the tool or the example charts change.
      - "crates/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "scripts/schemas.sh"
      - "mise.toml"
      - "mise.lock"
      - "taskfile.yaml"
      - ".github/workflows/pages.yaml"
  workflow_dispatch: {}

env:
  MISE_GITHUB_TOKEN: ${{ github.token }}
  MISE_AUTO_INSTALL: "0"

# Allow the GITHUB_TOKEN to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: sccache
    steps:
      - uses: actions/checkout@v7
      # Go, Python, and the extended Hugo build come from mise.
      - uses: jdx/mise-action@v4
        with:
          install: false
          cache: true
          env: false
      - run: mise install task go python "asdf:NeoHsu/asdf-hugo"
      # helm-schema is built from source so the docs render its live output
      # (schema snippets generated from docs/examples by scripts/schemas.sh).
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      - uses: mozilla-actions/sccache-action@v0.0.10
      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6
      # Regenerates the schema snippets from the current source, then builds the
      # site — the same `task docs:build` used locally. mise-action puts the tool
      # shims on PATH, so `task` resolves as in the other workflows.
      - name: Build docs
        run: task docs:build -- --baseURL "${{ steps.pages.outputs.base_url }}/"
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: docs/public

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
