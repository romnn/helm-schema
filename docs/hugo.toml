baseURL = 'https://romnn.github.io/helm-schema/'
title = 'helm-schema'
locale = 'en-us'

# Book configuration
disablePathToLower = true
enableGitInfo = false
enableRobotsTXT = true

# The hugo-book theme is pulled in as a Hugo module (needs Go at build time),
# pinned in go.mod/go.sum — no git submodule.
[module]
[[module.imports]]
path = 'github.com/alex-shpak/hugo-book'

# Mount the real example charts so the docs render their templates and values
# verbatim (drift-free — the docs read the actual chart files, so breaking an
# example breaks the docs and gets noticed). Their generated schemas live under
# assets/schemas (regenerated by scripts/schemas.sh).
[[module.mounts]]
source = 'assets'
target = 'assets'
[[module.mounts]]
source = 'examples'
target = 'assets/examples'

[markup]
[markup.goldmark.renderer]
  # Landing page hero and cards use inline HTML.
  unsafe = true
[markup.tableOfContents]
  startLevel = 2
  endLevel = 3
  ordered = false
[markup.highlight]
  # Emit CSS classes so light/dark syntax themes can be swapped via
  # prefers-color-scheme (see assets/_syntax.scss).
  noClasses = false
  tabWidth = 2

[params]
  description = "Generate a JSON Schema for a Helm chart's values.yaml by analyzing the chart's templates — template-aware, resource-aware, schema-backed."

  # Follow the reader's OS light/dark preference.
  BookTheme = 'auto'
  BookSection = 'docs'
  BookToC = true
  BookSearch = true
  BookComments = false
  # Project pages under a subpath + a precaching service worker is a recipe for
  # stale assets; keep it off.
  BookServiceWorker = false

  BookRepo = 'https://github.com/romnn/helm-schema'
  BookEditLink = '{{ .Site.Params.BookRepo }}/edit/main/docs{{ .Path }}'

[menu]
[[menu.after]]
  name = 'GitHub'
  url = 'https://github.com/romnn/helm-schema'
  weight = 10
[[menu.after]]
  name = 'crates.io'
  url = 'https://crates.io/crates/helm-schema-cli'
  weight = 20
[[menu.after]]
  name = 'docs.rs'
  url = 'https://docs.rs/helm-schema'
  weight = 30
